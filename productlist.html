<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список покупок</title>
</head>
<body>
  <h1>
    Список продуктов
  </h1>
  <form>
    <ul>
      <li><input type="checkbox" name="products" id="Bread">
      <label for="Bread">Хлеб</label></li>
      <li><input type="checkbox" name="products" id="Cream">
      <label for="Cream">Сметана</label></li>
      <li><input type="checkbox" name="products" id="Eggs">
      <label for="Eggs">Яйца</label></li>   
      <li><input type="checkbox" name="products" id="Coffee">
      <label for="Coffee">Кофе</label></li>  
    </ul>
  </form>
</body>
</html>
